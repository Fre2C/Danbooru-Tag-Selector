        async function initHistory(){try{const d=JSON.parse(localStorage.getItem(SK_ALL));if(d&&d.history&&d.history.length&&idbAvailable){for(const item of d.history){await idbPut(item);}delete d.history;localStorage.setItem(SK_ALL,JSON.stringify(d));}}catch(e){idbAvailable=false;}if(idbAvailable){try{const items=await idbGetAll();HISTORY=items.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));}catch(e){idbAvailable=false;try{const d=JSON.parse(localStorage.getItem(SK_ALL));if(d&&d.history)HISTORY=d.history;}catch(e2){}}}else{try{const d=JSON.parse(localStorage.getItem(SK_ALL));if(d&&d.history)HISTORY=d.history;}catch(e){}}historyLoaded=true;}

        function onCandResizeMove(e){if(!candResizeState)return;const delta=candResizeState.startX-e.clientX;CAND_WIDTH=Math.max(180,Math.min(600,candResizeState.startW+delta));applyCandWidth();}
        function onCandResizeEnd(){const handle=$('candResizeHandle');if(handle)handle.classList.remove('resizing');document.body.style.cursor='';document.body.classList.remove('no-scroll');candResizeState=null;saveAllData();document.removeEventListener('mousemove',onCandResizeMove);document.removeEventListener('mouseup',onCandResizeEnd);if($('panelBrowser').classList.contains('active'))renderBrowser();}
        let candDragState=null;
        function candGripDown(e,idx){if(e.target.closest('a')||e.target.closest('button'))return;e.preventDefault();const list=$('candList');const item=list.querySelectorAll('.cand-item')[idx];if(!item)return;candDragState={idx,item,startY:e.clientY,started:false,ghost:null,targetIdx:idx,itemHeight:0};document.addEventListener('pointermove',candGripMove);document.addEventListener('pointerup',candGripUp);}
        function candGripMove(e){if(!candDragState)return;if(!candDragState.started&&Math.abs(e.clientY-candDragState.startY)>3){candDragState.started=true;candDragState.itemHeight=candDragState.item.offsetHeight;candDragState.item.classList.add('dragging-item');const rect=candDragState.item.getBoundingClientRect();const g=candDragState.item.cloneNode(true);g.classList.remove('dragging-item');g.style.cssText='position:fixed;width:'+rect.width+'px;left:'+rect.left+'px;pointer-events:none;z-index:10000;opacity:.85;box-shadow:0 4px 20px rgba(0,0,0,.3);background:var(--surface-2);border-radius:var(--radius)';g.style.top=(e.clientY-15)+'px';document.body.appendChild(g);candDragState.ghost=g;}if(!candDragState.started)return;candDragState.ghost.style.top=(e.clientY-15)+'px';const allItems=[...document.querySelectorAll('.cand-item')];const from=candDragState.idx,h=candDragState.itemHeight;let targetIdx=allItems.length;for(let i=0;i<allItems.length;i++){if(i===from)continue;const rect=allItems[i].getBoundingClientRect();if(e.clientY<rect.top+rect.height/2){targetIdx=i;break;}}candDragState.targetIdx=targetIdx;allItems.forEach((item,i)=>{if(i===from)return;if(from<targetIdx)item.style.transform=(i>from&&i<targetIdx)?'translateY(-'+h+'px)':'';else if(from>targetIdx)item.style.transform=(i>=targetIdx&&i<from)?'translateY('+h+'px)':'';else item.style.transform='';});}
        function candGripUp(){if(!candDragState)return;document.removeEventListener('pointermove',candGripMove);document.removeEventListener('pointerup',candGripUp);document.querySelectorAll('.cand-item').forEach(el=>{el.style.transform='';});candDragState.item.classList.remove('dragging-item');if(candDragState.ghost)candDragState.ghost.remove();if(candDragState.started){const from=candDragState.idx;let to=candDragState.targetIdx;if(from!==to){const[m]=CANDIDATES.splice(from,1);if(to>from)to--;CANDIDATES.splice(to,0,m);renderCandidates();}}candDragState=null;}
        function openSettings(){document.body.classList.add('no-scroll');const chipsHtml=COLS.map(c=>'<span class="chip" onclick="insertChipTpl(\'sDisplayTpl\',\''+esc(c)+'\')">'+esc(c)+'</span>').join('');const chipsHtml2=COLS.map(c=>'<span class="chip" onclick="insertChipTpl(\'sSaveTpl\',\''+esc(c)+'\')">'+esc(c)+'</span>').join('');const linkOpts=COLS.map(c=>'<option value="'+esc(c)+'"'+(c===SETTINGS.linkCol?' selected':'')+'>'+esc(c)+'</option>').join('');const titleOpts=COLS.map(c=>'<option value="'+esc(c)+'"'+(c===SETTINGS.candTitleCol?' selected':'')+'>'+esc(c)+'</option>').join('');$('settingsModal').innerHTML='<h3>设置</h3><div class="stabs"><button class="stab active" onclick="switchSTab(this,\'stGeneral\')">URL 与链接</button><button class="stab" onclick="switchSTab(this,\'stDisplay\')">显示模板</button><button class="stab" onclick="switchSTab(this,\'stSave\')">保存模板</button><button class="stab" onclick="switchSTab(this,\'stExport\')">导入/导出</button></div><div class="stab-panel active" id="stGeneral"><div class="settings-field"><label>Wiki URL 模板</label><input type="text" id="sWikiUrl" value="'+esc(SETTINGS.wikiUrlTpl)+'"></div><div class="settings-field"><label>链接列（用于生成可点击的链接）</label><select id="sLinkCol">'+linkOpts+'</select></div><div class="settings-field"><label>候选标题列（候选列表中显示的标题来源列）</label><select id="sCandTitleCol">'+titleOpts+'</select></div></div><div class="stab-panel" id="stDisplay"><div style="font-size:10px;color:var(--text-muted);margin-bottom:6px">使用 <code>{{列名}}</code> 插入列值，<code>{{列名:enc}}</code> 插入 URL 编码值</div><div class="column-chips">'+chipsHtml+'</div><textarea class="tpl-area" id="sDisplayTpl" rows="6">'+esc(SETTINGS.displayTpl||generateDefaultTpl())+'</textarea></div><div class="stab-panel" id="stSave"><div class="column-chips">'+chipsHtml2+'</div><textarea class="tpl-area" id="sSaveTpl" rows="6">'+esc(SETTINGS.saveTpl||generateDefaultTpl())+'</textarea></div><div class="stab-panel" id="stExport"><button class="btn-sm" onclick="exportAllSettings()">导出设置</button><button class="btn-sm" onclick="importAllSettings()" style="margin-left:6px;">导入设置</button></div><div class="modal-actions"><button class="btn-modal btn-modal-cancel" onclick="closeSettings()">取消</button><button class="btn-modal btn-modal-ok" onclick="saveSettings()">保存</button></div>';$('settingsOverlay').classList.add('visible');}
        function switchSTab(btn,id){document.querySelectorAll('#settingsModal .stab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('#settingsModal .stab-panel').forEach(p=>p.classList.remove('active'));$(id).classList.add('active');}
        function insertChipTpl(taId,col){const ta=$(taId);if(!ta)return;const p=ta.selectionStart;ta.value=ta.value.slice(0,p)+'{{'+col+'}}'+ta.value.slice(p);ta.focus();}
        function saveSettings(){SETTINGS.wikiUrlTpl=($('sWikiUrl').value||'').trim()||SETTINGS.wikiUrlTpl;const newLinkCol=$('sLinkCol').value;const newTitleCol=$('sCandTitleCol').value;if(newLinkCol!==SETTINGS.linkCol){SETTINGS.linkCol=newLinkCol;BROWSER_DISPLAY=[];}if(newTitleCol!==SETTINGS.candTitleCol){SETTINGS.candTitleCol=newTitleCol;}SETTINGS.displayTpl=($('sDisplayTpl').value||'').trim();SETTINGS.saveTpl=($('sSaveTpl').value||'').trim();saveAllData();closeSettings();if(CUR.length)showRandomResults(CUR,false);renderCandidates();renderHistoryViews();renderHistory();renderCandColChips();if($('panelBrowser').classList.contains('active'))renderBrowser();toast('设置已保存');}
        function closeSettings(){document.body.classList.remove('no-scroll');$('settingsOverlay').classList.remove('visible');}
        function exportAllSettings(){SETTINGS.filters=getFilterState();downloadJSON({settings:{wikiUrlTpl:SETTINGS.wikiUrlTpl,linkCol:SETTINGS.linkCol,candTitleCol:SETTINGS.candTitleCol,displayTpl:SETTINGS.displayTpl,saveTpl:SETTINGS.saveTpl,filters:SETTINGS.filters,recordHistory:SETTINGS.recordHistory,avoidDups:SETTINGS.avoidDups,historyExtraCols:SETTINGS.historyExtraCols,candExtraCols:SETTINGS.candExtraCols,colOrder:COL_ORDER,colWidths:COL_WIDTHS,colHidden:[...COL_HIDDEN],candWidth:CAND_WIDTH}},'danbooru-tag-selector-settings.json');toast('设置已导出');}
        function importAllSettings(){const input=$('settingsFileInput');input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.settings){SETTINGS={...SETTINGS,...d.settings};if(d.settings.colOrder){const vc=d.settings.colOrder.filter(c=>COLS.includes(c));const nc=COLS.filter(c=>!vc.includes(c));COL_ORDER=[...vc,...nc];}if(d.settings.colWidths){COLS.forEach(c=>{if(d.settings.colWidths[c]!=null)COL_WIDTHS[c]=d.settings.colWidths[c];});}if(d.settings.colHidden){COL_HIDDEN=new Set(d.settings.colHidden.filter(c=>COLS.includes(c)));}if(d.settings.candWidth){CAND_WIDTH=d.settings.candWidth;applyCandWidth();}BROWSER_DISPLAY=[];saveAllData();if(SETTINGS.filters)restoreFilterState(SETTINGS.filters);syncHistoryOpts();renderColSettings();renderHistColChips();renderCandColChips();renderHistory();renderBrowser();openSettings();toast('设置已导入');}else throw new Error();}catch(err){toast('导入失败，请检查文件是否为正确的设置 JSON');}};r.readAsText(f);input.value='';};input.click();}
        function md2html(md){let out='',lines=md.split('\n'),inTbl=false,tbl=[];const inl=t=>t.replace(/\[([^\]]+)\]\(((?:[^()]*|\([^)]*\))*)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');const flush=()=>{if(!tbl.length)return;out+='<table>'+tbl.map(r=>'<tr>'+r.map(c=>'<td>'+inl(c)+'</td>').join('')+'</tr>').join('')+'</table>';tbl=[];inTbl=false;};for(const raw of lines){const l=raw.trim();if(!l){if(inTbl)flush();continue;}if(l.startsWith('|')&&l.endsWith('|')){const cells=l.slice(1,-1).split('|').map(s=>s.trim());if(cells.every(c=>/^[-:]+$/.test(c)))continue;inTbl=true;tbl.push(cells);continue;}if(inTbl)flush();if(l.startsWith('### ')){out+='<h3>'+inl(l.slice(4))+'</h3>';continue;}if(l.startsWith('## ')){out+='<h2>'+inl(l.slice(3))+'</h2>';continue;}if(l.startsWith('# ')){out+='<h1>'+inl(l.slice(2))+'</h1>';continue;}if(l==='---'||l==='***'){out+='<hr>';continue;}if(l.startsWith('> ')){out+='<blockquote>'+inl(l.slice(2))+'</blockquote>';continue;}out+='<p>'+inl(l)+'</p>';}if(inTbl)flush();return out;}
        let modalCb=null;function showModal(title,body,onConfirm,okText='确定'){modalCb=onConfirm;$('modalContent').innerHTML='<h3>'+title+'</h3><div>'+body+'</div>'+(onConfirm?'<div class="modal-actions"><button class="btn-modal btn-modal-cancel" onclick="hideModal()">取消</button><button class="btn-modal btn-modal-ok" onclick="confirmModal()">'+okText+'</button></div>':'<div class="modal-actions"><button class="btn-modal btn-modal-cancel" onclick="hideModal()">关闭</button></div>');$('modalOverlay').classList.add('visible');}
        function confirmModal(){if(modalCb)modalCb();hideModal();}function hideModal(){$('modalOverlay').classList.remove('visible');modalCb=null;}
        document.addEventListener('keydown',e=>{if(e.code==='Space'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){e.preventDefault();doRandom();}});
        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
        function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
        function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
        function downloadJSON(obj,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}));a.download=name;a.click();URL.revokeObjectURL(a.href);}
        let _browserColDragInit=false;
        function initBrowserColDrag(){if(_browserColDragInit)return;const area=document.getElementById('browserArea');if(!area)return;_browserColDragInit=true;area.addEventListener('dragstart',function(e){const th=e.target.closest('th.col-content');if(!th)return;onColDragStart(e,th.dataset.col);});area.addEventListener('dragover',function(e){const th=e.target.closest('th.col-content');if(th){e.preventDefault();onColDragOver(e,th.dataset.col);}});area.addEventListener('dragleave',function(e){const th=e.target.closest('th.col-content');if(th)onColDragLeave(e);});area.addEventListener('drop',function(e){const th=e.target.closest('th.col-content');if(th){e.preventDefault();onColDrop(e,th.dataset.col);}});area.addEventListener('dragend',function(e){onColDragEnd();});}
    </script>
