    <script>
    'use strict';

    // ===== 全局状态 & 常量 =====
    const $ = id => document.getElementById(id);

    let
      DATA = [], COLS = [], FILTERED = [], FIDX = [],

      historyExpanded = false, searchTerm = '',
      browserSortCol = '', browserSortDir = 'asc',
      browserPage = 1, browserPageSize = 25,
      COL_ORDER = [], COL_WIDTHS = {}, COL_HIDDEN = new Set(),
      colDragState = null, dragSourceData = null,
      browserRenderGen = 0, BROWSER_DISPLAY = [],
      CAND_WIDTH = 280, candResizeState = null;

    let SETTINGS = {
      wikiUrlTpl: 'https://danbooru.donmai.us/wiki_pages/{value}',
      linkCol: '', candTitleCol: '',
      displayTpl: '', saveTpl: '',
      recordHistory: true, avoidDups: false,
      historyExtraCols: [], candExtraCols: [], filters: null
    };

    const
      HIST_SHOW = 10, VAL_WARN = 500,
      DB_NAME = 'DanbooruTagSelectorDB', DB_VERSION = 2,
      HIST_STORE = 'history', HIST_LIMIT = 2000,
      HIST_IMPORT_LIMIT = 5000, SK_ALL = 'dts_all_data',
      INDEX_COL_W = 48, ACT_COL_W = 72;

    let
      historyLoaded = false, historyLoadPromise = null,
      idbAvailable = true, colHeaderMouseDown = false,
      colResizeState = null, candDragState = null,
      _browserColDragInit = false, modalCb = null;

    // ===== 模块 1: UI =====
    const UI = (() => {
      function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
      function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200); }
      function downloadJSON(obj, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' })); a.download = name; a.click(); URL.revokeObjectURL(a.href); }

      function md2html(md) {
        let out = '', lines = md.split('\n'), inTbl = false, tbl = [];
        const inl = t => t.replace(/\[([^\]]+)\]\(((?:[^()]*|\([^)]*\))*)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>');
        const flush = () => { if (!tbl.length) return; out += '<table>' + tbl.map(r => '<tr>' + r.map(c => '<td>' + inl(c) + '</td>').join('') + '</tr>').join('') + '</table>'; tbl = []; inTbl = false; };
        for (const raw of lines) {
          const l = raw.trim();
          if (!l) { if (inTbl) flush(); continue; }
          if (l.startsWith('|') && l.endsWith('|')) { const cells = l.slice(1, -1).split('|').map(s => s.trim()); if (cells.every(c => /^[-:]+$/.test(c))) continue; inTbl = true; tbl.push(cells); continue; }
          if (inTbl) flush();
          if (l.startsWith('### ')) { out += '<h3>' + inl(l.slice(4)) + '</h3>'; continue; }
          if (l.startsWith('## ')) { out += '<h2>' + inl(l.slice(3)) + '</h2>'; continue; }
          if (l.startsWith('# ')) { out += '<h1>' + inl(l.slice(2)) + '</h1>'; continue; }
          if (l === '---' || l === '***') { out += '<hr>'; continue; }
          if (l.startsWith('> ')) { out += '<blockquote>' + inl(l.slice(2)) + '</blockquote>'; continue; }
          out += '<p>' + inl(l) + '</p>';
        }
        if (inTbl) flush();
        return out;
      }

      function showModal(title, body, onConfirm, okText) { if (okText === undefined) okText = '确定'; modalCb = onConfirm; $('modalContent').innerHTML = '<h3>' + title + '</h3><div>' + body + '</div>' + (onConfirm ? '<div class="modal-actions"><button class="btn-modal btn-modal-cancel" onclick="hideModal()">取消</button><button class="btn-modal btn-modal-ok" onclick="confirmModal()">' + okText + '</button></div>' : '<div class="modal-actions"><button class="btn-modal btn-modal-cancel" onclick="hideModal()">关闭</button></div>'); $('modalOverlay').classList.add('visible'); }
      function confirmModal() { if (modalCb) modalCb(); hideModal(); }
      function hideModal() { $('modalOverlay').classList.remove('visible'); modalCb = null; }
      function refreshCount() { $('statFiltered').textContent = FILTERED.length.toLocaleString(); }

      function buildUrl(value) { return SETTINGS.wikiUrlTpl.replace('{value}', encodeURIComponent(value)); }
      function generateDefaultTpl() { if (!COLS.length) return ''; const f = COLS[0]; let t = '# [{{' + f + '}}](' + SETTINGS.wikiUrlTpl.replace('{value}', '{{' + f + ':enc}}') + ')'; for (let i = 1; i < COLS.length; i++) t += '\n\n**' + COLS[i] + '**: {{' + COLS[i] + '}}'; return t; }
      function getDisplayTemplate() { return SETTINGS.displayTpl || generateDefaultTpl(); }
      function getSaveTemplate() { return SETTINGS.saveTpl || generateDefaultTpl(); }

      function saveSettings() { SETTINGS.wikiUrlTpl = ($('sWikiUrl').value || '').trim() || SETTINGS.wikiUrlTpl; const newLinkCol = $('sLinkCol').value, newTitleCol = $('sCandTitleCol').value; if (newLinkCol !== SETTINGS.linkCol) { SETTINGS.linkCol = newLinkCol; BROWSER_DISPLAY = []; } if (newTitleCol !== SETTINGS.candTitleCol) { SETTINGS.candTitleCol = newTitleCol; } SETTINGS.displayTpl = ($('sDisplayTpl').value || '').trim(); SETTINGS.saveTpl = ($('sSaveTpl').value || '').trim(); Storage.saveAllData(); closeSettings(); if (CUR.length) showRandomResults(CUR, false); renderCandidates(); renderHistoryViews(); renderHistory(); renderCandColChips(); if ($('panelBrowser').classList.contains('active')) renderBrowser(1); toast('设置已保存'); }
      function closeSettings() { document.body.classList.remove('no-scroll'); $('settingsOverlay').classList.remove('visible'); }
      function exportAllSettings() { SETTINGS.filters = Filter.getFilterState(); downloadJSON({ settings: { wikiUrlTpl: SETTINGS.wikiUrlTpl, linkCol: SETTINGS.linkCol, candTitleCol: SETTINGS.candTitleCol, displayTpl: SETTINGS.displayTpl, saveTpl: SETTINGS.saveTpl, filters: SETTINGS.filters, recordHistory: SETTINGS.recordHistory, avoidDups: SETTINGS.avoidDups, historyExtraCols: SETTINGS.historyExtraCols, candExtraCols: SETTINGS.candExtraCols, colOrder: COL_ORDER, colWidths: COL_WIDTHS, colHidden: [...COL_HIDDEN], candWidth: CAND_WIDTH } }, 'danbooru-tag-selector-settings.json'); toast('设置已导出'); }
      function importAllSettings() { const input = $('settingsFileInput'); input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d.settings) { SETTINGS = { ...SETTINGS, ...d.settings }; if (d.settings.colOrder) { const vc = d.settings.colOrder.filter(c => COLS.includes(c)); const nc = COLS.filter(c => !vc.includes(c)); COL_ORDER = [...vc, ...nc]; } if (d.settings.colWidths) { COLS.forEach(c => { if (d.settings.colWidths[c] != null) COL_WIDTHS[c] = d.settings.colWidths[c]; }); } if (d.settings.colHidden) { COL_HIDDEN = new Set(d.settings.colHidden.filter(c => COLS.includes(c))); } if (d.settings.candWidth) { CAND_WIDTH = d.settings.candWidth; applyCandWidth(); } BROWSER_DISPLAY = []; Storage.saveAllData(); if (SETTINGS.filters) Filter.restoreFilterState(SETTINGS.filters); syncHistoryOpts(); renderColSettings(); renderHistColChips(); renderCandColChips(); renderHistory(); renderBrowser(); openSettings(); toast('设置已导入'); } else throw new Error(); } catch (err) { toast('导入失败，请检查文件是否为正确的设置 JSON'); } }; r.readAsText(f); input.value = ''; }; input.click(); }

      return { openSettings, switchSTab, insertChipTpl, saveSettings, closeSettings, exportAllSettings, importAllSettings };
    })();
    const openSettings = Settings.openSettings, switchSTab = Settings.switchSTab, insertChipTpl = Settings.insertChipTpl, saveSettings = Settings.saveSettings, closeSettings = Settings.closeSettings, exportAllSettings = Settings.exportAllSettings, importAllSettings = Settings.importAllSettings;

    // ===== 初始化执行 =====
    Storage.loadAllData();
    applyCandWidth();
    (function(){const t=localStorage.getItem('dts_theme')||'dark';document.documentElement.setAttribute('data-theme',t);window.addEventListener('DOMContentLoaded',()=>setThemeIcon(t));})();
    setTimeout(() => { DragDrop.setupCandidateDrop(); }, 100);

    const uploadZone=$('uploadZone'),fileInput=$('fileInput');
    uploadZone.addEventListener('click',e=>{if(e.target.closest('.enc-row'))return;fileInput.click();});
    uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover');});
    uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
    fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

    function syncHistoryOpts(){$('optRecordHistory').checked=SETTINGS.recordHistory;$('optAvoidDups').checked=SETTINGS.avoidDups;}
    $('optRecordHistory').addEventListener('change',function(){SETTINGS.recordHistory=this.checked;Storage.saveAllData();});
    $('optAvoidDups').addEventListener('change',function(){SETTINGS.avoidDups=this.checked;Storage.saveAllData();});

    $('countInput').addEventListener('wheel',e=>{e.preventDefault();adjustCount(e.deltaY<0?1:-1);},{passive:false});

    DragDrop.setupCandidateDrop();

    // 自定义下拉组件（替代原生 select，消除闪烁）
    function replaceSelect(selEl) { if (selEl.closest('.c-select')) return;
      const w = document.createElement('span'); w.className = 'c-select';
      const v = document.createElement('span'); v.className = 'c-select-val';
      const a = document.createElement('span'); a.className = 'c-select-arrow'; a.innerHTML = '&#9662;';
      const d = document.createElement('span'); d.className = 'c-select-drop';
      const sync = () => { const idx = selEl.selectedIndex; v.textContent = selEl.options[idx]?.text || ''; d.querySelectorAll('.sel').forEach(o => o.classList.remove('sel')); if (d.children[idx]) d.children[idx].classList.add('sel'); };
      for (let i = 0; i < selEl.options.length; i++) { const o = document.createElement('span'); o.className = 'c-select-opt'; o.textContent = selEl.options[i].text; o.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); selEl.selectedIndex = i; sync(); selEl.dispatchEvent(new Event('change', { bubbles: true })); w.classList.remove('open'); }); d.appendChild(o); }
      sync();
      w.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); if (w.classList.contains('open')) { w.classList.remove('open'); return; } closeAllCSelects(); w.classList.add('open'); const r = w.getBoundingClientRect(); d.style.top = (r.bottom + 2) + 'px'; d.style.left = r.left + 'px'; if (d.classList.contains('sel')) d.querySelector('.sel').scrollIntoView({ block: 'nearest' }); });
      w.appendChild(v); w.appendChild(a); w.appendChild(d);
      selEl.style.display = 'none'; selEl.parentNode.insertBefore(w, selEl); w.appendChild(selEl);
      selEl._cSet = (newVal) => { for (let i = 0; i < selEl.options.length; i++) { if (selEl.options[i].value === newVal || selEl.options[i].text === newVal) { selEl.selectedIndex = i; sync(); return; } } };
    }
    function closeAllCSelects() { document.querySelectorAll('.c-select.open').forEach(w => w.classList.remove('open')); }
    document.addEventListener('mousedown', e => { if (!e.target.closest('.c-select')) closeAllCSelects(); });
    document.addEventListener('scroll', closeAllCSelects, { passive: true, capture: true });

    // 初始化所有静态 select
    document.querySelectorAll('select').forEach(s => replaceSelect(s));

    document.addEventListener('keydown',e=>{if(e.code==='Space'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){e.preventDefault();doRandom();}});
    </script>
</body>
</html>
